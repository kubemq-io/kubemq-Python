# .github/dependabot.yml — CANONICAL ARTIFACT (spec 12)
# Other specs MUST NOT redefine this file. See TYPE-REGISTRY.md.

version: 2
updates:
  # Python pip dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      grpc:
        patterns:
          - "grpcio*"
          - "protobuf"
      testing:
        patterns:
          - "pytest*"
          - "hypothesis"
          - "coverage"
      linting:
        patterns:
          - "ruff"
          - "mypy"
          - "basedpyright"
          - "pyrefly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
