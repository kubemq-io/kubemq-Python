# .github/workflows/release.yml
# CANONICAL release pipeline — owned by 11-packaging-spec.md
# Triggered by version tags (v*). Validates, tests, builds, publishes to PyPI,
# and creates a GitHub Release with changelog content.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"   # v4.0.0, v4.0.0a1, v4.0.0rc1, etc.

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false          # never cancel a release in progress

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Job 1: Validate
  # Ensures the tag matches the version in pyproject.toml and that
  # the CHANGELOG has an entry for this version.
  # ──────────────────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      changelog_body: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG}, Version: ${VERSION}"

      - name: Verify version consistency
        run: |
          TAG_VERSION="${{ steps.extract.outputs.version }}"
          TOML_VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          ")
          echo "Tag version:  ${TAG_VERSION}"
          echo "TOML version: ${TOML_VERSION}"
          if [ "${TAG_VERSION}" != "${TOML_VERSION}" ]; then
              echo "::error::Version mismatch: tag=${TAG_VERSION}, pyproject.toml=${TOML_VERSION}"
              exit 1
          fi

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.extract.outputs.version }}"
          BODY=$(python3 -c "
          import re, sys
          with open('CHANGELOG.md') as f:
              content = f.read()
          ver_escaped = re.escape('${VERSION}')
          pattern = rf'## \[{ver_escaped}\].*?\n(.*?)(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          if not match:
              print('::error::No CHANGELOG entry found for version ${VERSION}', file=sys.stderr)
              sys.exit(1)
          body = match.group(1).strip()
          if not body:
              print('::error::CHANGELOG entry for ${VERSION} is empty', file=sys.stderr)
              sys.exit(1)
          print(body)
          ")
          {
            echo "body<<CHANGELOG_EOF"
            echo "${BODY}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────
  # Job 2: Test (Q11 resolved: unit tests only)
  # Runs unit tests only — NOT integration tests. Integration tests
  # require a running KubeMQ server; depending on server availability
  # adds fragility to the release pipeline. Integration tests run in
  # the CI pipeline (on every PR), providing confidence before the
  # tag is created. This job validates what has already passed CI.
  # ──────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            --cov=kubemq \
            --cov-fail-under=40 \
            --timeout=30 \
            -x -q

  # ──────────────────────────────────────────────────────────────────
  # Job 3: Build
  # Builds sdist and wheel, verifies with twine check, generates
  # SHA-256 checksums for all artifacts.
  # ──────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [validate, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ──────────────────────────────────────────────────────────────────
  # Job 4: Publish to PyPI
  # Uses PyPI Trusted Publishing (OIDC) — no API keys needed.
  # Requires configuring a "trusted publisher" on PyPI:
  #   https://docs.pypi.org/trusted-publishers/adding-a-publisher/
  #
  # Setup: PyPI project "kubemq" → Publishing → Add publisher:
  #   Owner: kubemq-io
  #   Repository: kubemq-Python
  #   Workflow: release.yml
  #   Environment: pypi
  # ──────────────────────────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    needs: [validate, build]
    environment:
      name: pypi
      url: https://pypi.org/project/kubemq/${{ needs.validate.outputs.version }}/
    permissions:
      id-token: write          # Required for OIDC / Trusted Publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

  # ──────────────────────────────────────────────────────────────────
  # Job 5: GitHub Release
  # Creates a GitHub Release with the CHANGELOG excerpt and
  # attaches the sdist, wheel, and checksum file.
  # ──────────────────────────────────────────────────────────────────
  github-release:
    runs-on: ubuntu-latest
    needs: [validate, publish]
    permissions:
      contents: write          # Required to create releases
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ needs.validate.outputs.version }}
          body: |
            ## What's Changed

            ${{ needs.validate.outputs.changelog_body }}

            ---

            **Install / Upgrade:**
            ```bash
            pip install kubemq==${{ needs.validate.outputs.version }}
            ```

            **Checksums:** See `SHA256SUMS.txt` in the release assets.
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.version, 'a') || contains(needs.validate.outputs.version, 'b') || contains(needs.validate.outputs.version, 'rc') || contains(needs.validate.outputs.version, 'dev') }}
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/SHA256SUMS.txt
