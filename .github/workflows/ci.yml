# .github/workflows/ci.yml
# CANONICAL CI pipeline — owned by 04-testing-spec.md
# Other specs (07-code-quality, 12-compatibility) reference this definition.

name: CI

on:
  push:
    branches: [main, master, v4]
  pull_request:
    branches: [main, master, v4]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Job 1: Lint
  # Runs ruff check + ruff format + mypy.
  # See 07-code-quality-spec.md for linter configuration details.
  # ──────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff>=0.8.0 mypy>=1.15.0

      - name: Ruff check
        run: ruff check src/

      - name: Ruff format check
        run: ruff format --check src/

      - name: Type check
        run: |
          pip install -e "."
          mypy src/kubemq/ --ignore-missing-imports

      - name: Lint examples
        run: ruff check examples/

  # ──────────────────────────────────────────────────────────────────
  # Job 2: Unit Tests
  # Matrix: Python 3.11, 3.12, 3.13 × ubuntu-latest.
  # Per review-r1 C-3: aligned with GS REQ-COMPAT-3 "latest 3 releases".
  # Coverage enforcement: Phase 1 ≥40%, Phase 2 ≥60%, Phase 3 ≥80%.
  # ──────────────────────────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e "." && pip install pytest pytest-asyncio pytest-cov pytest-timeout pytest-mock

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=kubemq \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml \
            --cov-fail-under=40 \
            --timeout=30 \
            -x

      - name: Upload unit test coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.xml

  # ──────────────────────────────────────────────────────────────────
  # Job 3: Integration Tests
  # Runs against a real KubeMQ server via Docker service container.
  # Single Python version (3.12) — integration behavior is
  # runtime-independent; version matrix coverage is in unit-tests.
  # ──────────────────────────────────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    services:
      kubemq:
        image: kubemq/kubemq:v2.6.0
        ports:
          - 50000:50000
        options: >-
          --health-cmd "curl -f http://localhost:8080/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e "." && pip install pytest pytest-asyncio pytest-cov pytest-timeout pytest-mock

      - name: Wait for KubeMQ server
        run: |
          for i in $(seq 1 30); do
            if python -c "import socket; s=socket.socket(); s.settimeout(1); s.connect(('localhost', 50000)); s.close()" 2>/dev/null; then
              echo "KubeMQ server is ready"
              exit 0
            fi
            echo "Waiting for KubeMQ server... ($i/30)"
            sleep 2
          done
          echo "KubeMQ server did not start in time"
          exit 1

      - name: Run integration tests
        env:
          KUBEMQ_ADDRESS: localhost:50000
        run: |
          pytest tests/integration/ \
            -m integration \
            --timeout=60 \
            -v

      - name: Smoke-test examples
        env:
          KUBEMQ_ADDRESS: localhost:50000
        run: |
          timeout 30 python examples/connection/connect.py || true
          timeout 30 python examples/connection/ping.py || true

  # ──────────────────────────────────────────────────────────────────
  # Job 4: Coverage Report
  # Combines coverage from unit tests and uploads to Codecov.
  # Enforces phased coverage threshold.
  # See SPEC-TEST-5 for coverage tool configuration.
  # ──────────────────────────────────────────────────────────────────
  coverage:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/v4'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: coverage-unit

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-unit.xml
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
